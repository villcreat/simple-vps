# ─────────────────────────────────────────────────────────────────────────────
# VPS Simple — манифест плагина (plugin.yaml)
# Скопируйте эту папку, переименуйте и замените значения на свои.
# ─────────────────────────────────────────────────────────────────────────────

# Уникальный идентификатор плагина (латиница, без пробелов). Должен быть уникален.
id: my-service

# Человекочитаемое название, показывается в каталоге и на карточке.
name: My Service

# Версия плагина (semver). Повышайте при изменениях.
version: 0.1.0

# Короткое описание (необязательно) — выводится в предпросмотре сценария.
summary: Установка My Service одной кнопкой.

# Какой установщик использовать для какой ОС.
# Ключ windows можно не дублировать как windows_server — подходит оба варианта.
entry:
  ubuntu: scripts/ubuntu_install.yaml
  debian: scripts/debian_install.yaml
  windows: scripts/windows_install.yaml
